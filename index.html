<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Whispr</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🕶️ Whispr</header>

<div onclick="activarAdmin()" class="admin-btn">⚙</div>

<div class="tabs">
  <div id="tab-trending" class="tab active" onclick="switchTab('ranking')">🔥 Tendencias</div>
  <div id="tab-channels" class="tab" onclick="toggleChannels()">📂 Canales ⬇</div>
  <div class="tab" onclick="switchTab('fama')">🏆 Salón</div>
  <div class="tab" onclick="switchTab('info')">ℹ️ Info</div>
</div>

<!-- Dropdown de canales -->
<div id="channels-dropdown" class="channels-dropdown">
  <div onclick="selectChannel('general')">💬 General</div>
  <div onclick="selectChannel('profesores')">👨‍🏫 Profesores</div>
  <div onclick="selectChannel('experiencias')">🧠 Experiencias</div>
  <div onclick="selectChannel('quejas')">⚠️ Quejas</div>
</div>

<!-- Texto flotante del canal -->
<div id="current-channel">
  Canal: General
</div>

<div class="search-bar">
  <input id="searchInput" placeholder="Buscar..." oninput="render()">
</div>

<div id="content"></div>

<button class="fab" onclick="openModal()">＋</button>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <textarea id="newMsg" placeholder="¿Qué quieres decir?"></textarea>
    <button onclick="addMessage()">Publicar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="app.js"></script>

</body>
</html>
